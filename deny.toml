# cargo-deny configuration for sledge.
# Run `cargo deny check` locally or in CI.

[advisories]
ignore  = []
version = 2
yanked  = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "Unlicense",
]
confidence-threshold = 0.8
version = 2

[bans]
multiple-versions = "allow"
wildcards         = "allow"

[sources]
allow-git        = []
unknown-git      = "allow"
unknown-registry = "deny"
